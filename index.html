<script>
// ✅ YOUR LIVE APPS SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIYs_twrQslkWZCrr42JtqTXFcQPBOeSnEsfN0JN_HgJ9GpLRRX7T6aQMDtq0qbXR9/exec";

// STATE
let playerEmail = '';
let hintedCells = new Set();

// ─────────────────────────────────────────
// ✅ EMAIL CHECK
// ─────────────────────────────────────────
async function checkEmailPlayed(email) {
  try {
    const res = await fetch(`${SCRIPT_URL}?action=check&email=${encodeURIComponent(email)}`);
    const data = await res.json();
    return data.played === true;
  } catch (err) {
    console.warn("Check failed:", err);
    return false;
  }
}

// ─────────────────────────────────────────
// ✅ SAVE TO SHEETS
// ─────────────────────────────────────────
async function sendToSheets(email, event, score, hints) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email,
        event,
        score,
        hints,
        maxScore: MAX_SCORE,
        timestamp: new Date().toISOString()
      })
    });

    const data = await res.json();
    console.log("Sheets:", data);

  } catch (err) {
    console.error("Sheets error:", err);
  }
}

// ─────────────────────────────────────────
// ✅ START GAME
// ─────────────────────────────────────────
async function handleStart() {
  const emailInput = document.getElementById("iEmail");
  const email = emailInput.value.trim().toLowerCase();

  if (!email || !email.includes("@")) {
    showGateError("Please enter a valid email.");
    return;
  }

  playerEmail = email;

  const btn = document.getElementById("startBtn");
  btn.disabled = true;
  btn.innerHTML = "Checking...";

  const alreadyPlayed = await checkEmailPlayed(email);

  if (alreadyPlayed) {
    document.getElementById("gateForm").style.display = "none";
    document.getElementById("playedEmail").textContent = email;
    document.getElementById("playedCard").style.display = "block";
    btn.disabled = true;
    return;
  }

  await sendToSheets(email, "started", 0, 0);

  document.getElementById("gateOverlay").style.display = "none";
  document.getElementById("app").style.display = "block";

  buildGrid();
  buildClues();

  setTimeout(() => {
    const w = WORDS.find(x => x.dir === 'across');
    if (w) activateWord(w);
  }, 150);
}

// ─────────────────────────────────────────
// ✅ FINAL SUBMIT (FIXED)
// ─────────────────────────────────────────
async function checkAnswers() {
  let allFilled = true;

  for (const k in cellEls) {
    const { wrap, inp } = cellEls[k];
    if (!inp.value) allFilled = false;
  }

  if (!allFilled) {
    setStatus("⚠ Fill all cells first", "#f5a623");
    return;
  }

  const allOk = Object.values(cellEls).every(({wrap}) =>
    wrap.classList.contains('ok')
  );

  if (allOk) {
    checkWordsRealTime(); // ensure score is updated
    const finalScore = calcScore();

    console.log("Submitting:", playerEmail, finalScore);

    if (!window.__submitted) {
      window.__submitted = true;
      await sendToSheets(playerEmail, "completed", finalScore, hintedCells.size);
    }

    populateWinScreen(finalScore);
    document.getElementById("winOverlay").classList.add("show");

  } else {
    setStatus("✕ Some answers are wrong", "#ff5555");
  }
}

// ENTER KEY SUPPORT
document.getElementById('iEmail').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleStart();
});
</script>
